name: binning
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core language
  - python=3.8

  # Workflow engine
  - snakemake=7.32.4

  # CLI
  - click=8.1.3
  - click-default-group=1.2.4

  # Data / science
  - pandas=1.4.3
  - numpy=1.23.2
  - pyyaml=6.0
  - biopython
  - scikit-learn
  - scipy
  - psutil

  # Bioinformatics tools (used by rules without conda: directive)
  # map_reads and sort_reads run in the main env, so bowtie2 + samtools live here
  - bowtie2
  - samtools
  # pysam is used in concoct_calculate_depth via run: block (main-env Python)
  - pysam

  # Snakemake dependencies
  - configargparse
  - datrie
  - dpath
  - filelock
  - gitpython
  - jinja2
  - jsonschema
  - nbformat
  - packaging
  - pulp
  - pyparsing
  - requests
  - smart_open
  - stopit
  - tabulate
  - toposort
  - traitlets
  - wrapt
  - yte

  # pip-only packages
  - pip
  - pip:
    - reretry
    - throttler
    - connection-pool
